# Build + push the NMOS Crosspoint Docker image to Docker Hub.
#
# Triggers:
#   - every push to master      → :latest, :<version-from-package.json>, :master-<sha>
#   - git tag `v*`              → :<tag-without-leading-v>, :latest
#   - manual workflow_dispatch  → same as push
#
# Required GitHub repo secrets:
#   - DOCKERHUB_TOKEN  : Docker Hub access token from
#                        https://hub.docker.com/settings/security
#                        (NOT your Docker Hub password)
#
# Hardcoded — change here if you ever rename the Docker Hub repo:
#   - Username  : gemini2350
#   - Image repo: gemini2350/nmos-crosspoint_v3

name: Docker

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Multi-arch builds via buildx don't need anything else.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Read the version field out of server/package.json so the published
      # tag matches what the running container reports on the Setup page.
      - name: Extract version from server/package.json
        id: version
        run: |
          v=$(jq -r .version server/package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Image version: $v"

      # QEMU registers binfmt handlers so buildx can produce arm64 binaries
      # on amd64 runners. Without this, the arm64 stage of the multi-arch
      # build would fail with "exec format error".
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gemini2350
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compute the set of tags to publish based on the trigger.
      #   push-to-master  : :latest + :<version> + :master-<sha7>
      #   tag-push v3.34  : :3.34   + :latest
      #   workflow_dispatch on master: same as push-to-master
      - name: Docker tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gemini2350/nmos-crosspoint_v3
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=sha,prefix=master-,format=short,enable={{is_default_branch}}
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx GHA cache — keeps npm ci + tsc + vite results between
          # runs so source-only changes finish in ~2-3 min instead of 10+.
          cache-from: type=gha
          cache-to: type=gha,mode=max
