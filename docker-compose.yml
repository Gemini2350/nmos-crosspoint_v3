services:
  nmos-crosspoint:
    build:
      context: ./

    container_name: nmos-crosspoint_v5
    hostname: nmos-crosspoint_v5
    domainname: local

    network_mode: host

    volumes:
      - ./server/config:/nmos-crosspoint/server/config
      - ./server/state:/nmos-crosspoint/server/state

    restart: unless-stopped